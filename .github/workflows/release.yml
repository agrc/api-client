name: Release Events

on:
  release:
    types: [published]

permissions:
  id-token: write
  deployments: write
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  deploy-macos:
    name: Publish macOS app
    runs-on: macos-latest
    environment:
      name: prod
    steps:
      - name: ⬇️ Set up code
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: ⎔ Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: 🐍 Set up python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: 🧑‍🎓 Set up signing certificates
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: 💻 Set up app DMG
        run: |
          python3 -m pip install setuptools

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🚀 Build macOS distributables
        run: pnpm make --arch=universal
        env:
          NODE_ENV: production
          APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
          APPLE_USER_ID: ${{ secrets.APPLE_USER_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GCP_KEYRING_PATH: ${{ secrets.GCP_KEYRING_PATH }}
          GCP_KEY_NAME: ${{ secrets.GCP_KEY_NAME }}
          VITE_IS_BETA: ${{ github.event.release.prerelease == true }}

      - name: ⬆️ Upload macOS distributables
        uses: actions/upload-artifact@v7
        with:
          name: macos-release-assets
          path: out/**/make/**
          if-no-files-found: error

  deploy-windows:
    name: Publish windows app
    runs-on: windows-latest
    environment:
      name: prod
    steps:
      - name: ⬇️ Set up code
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: ⎔ Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📦 Cache CNG Provider
        id: cache-cng
        uses: actions/cache@v5
        with:
          path: C:\Users\runneradmin\AppData\Local\Temp\KmsCngInstall
          key: cng-provider-v1.3-windows

      - name: 🏗️ Install Google Cloud KMS Provider
        shell: pwsh
        run: .\build\install-kms.ps1
        env:
          CACHE_HIT: ${{ steps.cache-cng.outputs.cache-hit }}

      - name: 🗝️ Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          access_token_scopes: "openid, https://www.googleapis.com/auth/cloudkms, https://www.googleapis.com/auth/cloud-platform"
          token_format: "access_token"
          workload_identity_provider: ${{ secrets.IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true

      - name: 🚀 Build Windows distributables
        run: pnpm run make
        env:
          NODE_ENV: production
          GCP_KEYRING_PATH: ${{ secrets.GCP_KEYRING_PATH }}
          GCP_KEY_NAME: ${{ secrets.GCP_KEY_NAME }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
          VITE_IS_BETA: ${{ github.event.release.prerelease == true }}

      - name: ⬆️ Upload Windows distributables
        uses: actions/upload-artifact@v7
        with:
          name: windows-release-assets
          path: out/**/make/**
          if-no-files-found: error

  upload-release-assets:
    name: Attach release assets
    needs: [deploy-macos, deploy-windows]
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Download macOS distributables
        uses: actions/download-artifact@v8
        with:
          name: macos-release-assets
          path: release-assets/macos

      - name: ⬇️ Download Windows distributables
        uses: actions/download-artifact@v8
        with:
          name: windows-release-assets
          path: release-assets/windows

      - name: 🚀 Attach distributables to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          find release-assets -type f -print0 | while IFS= read -r -d '' file; do
            gh release upload "$RELEASE_TAG" "$file" --clobber
          done

  change-management:
    name: Change management
    needs: [deploy-macos, deploy-windows, upload-release-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: 🔔 Create deployment notification
        uses: agrc/service-now-worknote-action@v1
        with:
          repo-token: ${{ github.token }}
          username: ${{ secrets.SN_USERNAME }}
          password: ${{ secrets.SN_PASSWORD }}
          instance-name: ${{ secrets.SN_INSTANCE }}
          table-name: ${{ secrets.SN_TABLE }}
          system-id: ${{ secrets.SN_SYS_ID }}

      - name: 💬 Comment on issues in release
        uses: agrc/release-issue-notifications-action@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
